[colors]
# Background: Deep charcoal/gray with slight transparency
background=1e1e1eff
# Text: Pure white
text=ffffffff
# Input text: Off-white for slight distinction
input=f2f2f2ff
# Match characters: Bright white (bold/highlighted)
match=ffffffff
# Selection background: Mid-gray to pop against the dark background
selection=454545ff
# Selection text: Pure white
selection-text=ffffffff
# Selection match: Pure white
selection-match=ffffffff
# Border: Light gray for a subtle frame
border=3a3a3aff

[border]
width=2
radius=8

